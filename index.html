<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PUB Legal — Counsel</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="/config.js"></script>
<style>
:root {
  --black: #0a0a0a;
  --white: #f5f3ee;
  --cream: #ede9e0;
  --red: #c8392b;
  --red-dark: #a12220;
  --mid: #7a7268;
  --border: #d0ccc4;
  --green: #1a6b3c;
  --amber: #b87a0a;
  --blue: #1a4a8a;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--white);
  color: var(--black);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── HEADER ── */
header {
  background: var(--black);
  color: var(--white);
  height: 56px;
  padding: 0 1.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  border-bottom: 3px solid var(--red);
}
.logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.55rem; letter-spacing: 0.06em; }
.logo span { color: var(--red); }
.header-right { display: flex; align-items: center; gap: 0.75rem; }
.attorney-pill {
  font-family: 'DM Mono', monospace;
  font-size: 0.7rem;
  letter-spacing: 0.07em;
  color: #ccc;
  border: 1px solid #444;
  padding: 3px 10px;
  cursor: pointer;
}
.attorney-pill:hover { border-color: var(--white); color: var(--white); }
.btn-header {
  background: var(--red);
  color: var(--white);
  border: none;
  padding: 6px 14px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.78rem;
  font-weight: 600;
  cursor: pointer;
  letter-spacing: 0.04em;
}
.btn-header:hover { background: var(--red-dark); }

/* ── LAYOUT ── */
.layout { flex: 1; display: flex; overflow: hidden; }

/* ── SIDEBAR ── */
.sidebar {
  width: 300px;
  min-width: 300px;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--white);
}
.sidebar-top { padding: 0.9rem; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.search-input {
  width: 100%;
  padding: 7px 10px;
  border: 1px solid var(--border);
  background: var(--cream);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.82rem;
  outline: none;
  margin-bottom: 0.6rem;
  color: var(--black);
}
.search-input:focus { border-color: var(--black); }
.chips { display: flex; flex-wrap: wrap; gap: 4px; }
.chip {
  background: none;
  border: 1px solid var(--border);
  padding: 3px 9px;
  font-size: 0.68rem;
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.05em;
  cursor: pointer;
  color: var(--mid);
}
.chip.active { background: var(--black); color: var(--white); border-color: var(--black); }
.chip:hover:not(.active) { border-color: var(--black); color: var(--black); }

.ticket-list { flex: 1; overflow-y: auto; }
.ticket-item {
  padding: 0.8rem 1rem;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.1s;
  border-left: 3px solid transparent;
}
.ticket-item:hover { background: var(--cream); }
.ticket-item.active { background: var(--cream); border-left-color: var(--red); }
.ti-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3px; }
.ti-id { font-family: 'DM Mono', monospace; font-size: 0.68rem; color: var(--mid); letter-spacing: 0.07em; }
.ti-title { font-size: 0.83rem; font-weight: 500; margin-bottom: 3px; line-height: 1.3; }
.ti-meta { font-size: 0.7rem; color: var(--mid); }

/* ── STATUS PILLS ── */
.pill {
  font-size: 0.62rem;
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.06em;
  padding: 2px 7px;
  font-weight: 500;
  white-space: nowrap;
}
.pill-new    { background: #dce8f5; color: var(--blue); }
.pill-prog   { background: #fef3dc; color: var(--amber); }
.pill-urgent { background: #fde8e6; color: var(--red); }
.pill-done   { background: #ddf0e7; color: var(--green); }

/* ── MAIN PANEL ── */
main { flex: 1; overflow-y: auto; }

.welcome {
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: var(--border);
  gap: 0.5rem;
}
.welcome-logo { font-family: 'Bebas Neue', sans-serif; font-size: 4rem; letter-spacing: 0.05em; }
.welcome-sub { font-size: 0.75rem; font-family: 'DM Mono', monospace; letter-spacing: 0.1em; color: var(--mid); }

/* ── TICKET DETAIL ── */
.detail { padding: 1.75rem 2rem; max-width: 860px; }
.detail-back {
  background: none; border: none;
  font-size: 0.7rem; color: var(--mid);
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.06em;
  cursor: pointer; padding: 0 0 1.25rem 0;
  display: block;
}
.detail-back:hover { color: var(--black); }
.detail-id { font-family: 'DM Mono', monospace; font-size: 0.72rem; color: var(--mid); letter-spacing: 0.09em; margin-bottom: 0.35rem; }
.detail-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.9rem; letter-spacing: 0.03em; line-height: 1.1; margin-bottom: 0.75rem; }
.detail-meta { display: flex; flex-wrap: wrap; gap: 0.4rem; align-items: center; margin-bottom: 1.25rem; }
.meta-chip { font-size: 0.7rem; color: var(--mid); background: var(--cream); padding: 3px 8px; }

/* Status bar */
.status-bar {
  display: flex; align-items: center; gap: 5px; flex-wrap: wrap;
  background: var(--cream); border: 1px solid var(--border);
  padding: 0.6rem 0.9rem; margin-bottom: 1.5rem;
}
.status-bar-label { font-size: 0.68rem; color: var(--mid); font-family: 'DM Mono', monospace; letter-spacing: 0.06em; margin-right: 4px; }
.status-btn {
  background: var(--white); border: 1px solid var(--border);
  padding: 4px 12px; font-size: 0.72rem;
  font-family: 'DM Sans', sans-serif; font-weight: 500;
  cursor: pointer; color: var(--black);
}
.status-btn:hover { border-color: var(--black); }
.status-btn.active { background: var(--black); color: var(--white); border-color: var(--black); }

/* Sections */
.section { margin-bottom: 1.75rem; }
.section-head {
  font-size: 0.68rem; font-family: 'DM Mono', monospace;
  letter-spacing: 0.1em; color: var(--mid); text-transform: uppercase;
  padding-bottom: 0.5rem; border-bottom: 1px solid var(--border);
  margin-bottom: 0.85rem;
  display: flex; justify-content: space-between; align-items: center;
}
.section-head button {
  background: none; border: 1px solid var(--border);
  padding: 2px 9px; font-size: 0.65rem; cursor: pointer;
  font-family: 'DM Mono', monospace; letter-spacing: 0.05em; color: var(--mid);
}
.section-head button:hover { background: var(--black); color: var(--white); border-color: var(--black); }

.description { font-size: 0.87rem; line-height: 1.65; white-space: pre-wrap; color: #222; }
.extra-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 0.6rem; margin-top: 0.85rem; }
.extra-field { font-size: 0.8rem; }
.extra-label { font-size: 0.65rem; font-family: 'DM Mono', monospace; color: var(--mid); letter-spacing: 0.07em; display: block; margin-bottom: 2px; }

/* Documents */
.doc-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.55rem 0; border-bottom: 1px solid var(--border); }
.doc-item:last-child { border-bottom: none; }
.doc-ext { background: var(--black); color: var(--white); font-size: 0.58rem; font-family: 'DM Mono', monospace; padding: 3px 5px; min-width: 34px; text-align: center; }
.doc-info { flex: 1; min-width: 0; }
.doc-name { font-size: 0.82rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.doc-meta { font-size: 0.68rem; color: var(--mid); }
.doc-dl { font-size: 0.75rem; color: var(--mid); text-decoration: none; padding: 3px 8px; border: 1px solid var(--border); flex-shrink: 0; }
.doc-dl:hover { background: var(--black); color: var(--white); }

/* Messages */
.messages {
  height: 260px; overflow-y: auto;
  border: 1px solid var(--border); padding: 0.9rem;
  background: var(--cream); margin-bottom: 0.65rem;
  display: flex; flex-direction: column; gap: 0.75rem;
}
.msg { display: flex; flex-direction: column; }
.msg-counsel { align-items: flex-end; }
.msg-employee { align-items: flex-start; }
.msg-bubble {
  display: inline-block; max-width: 72%;
  padding: 0.45rem 0.7rem;
  font-size: 0.84rem; line-height: 1.45;
  white-space: pre-wrap;
}
.msg-counsel .msg-bubble { background: var(--black); color: var(--white); }
.msg-employee .msg-bubble { background: var(--white); border: 1px solid var(--border); }
.msg-meta { font-size: 0.65rem; color: var(--mid); font-family: 'DM Mono', monospace; margin-top: 3px; }
.reply-row { display: flex; gap: 0.5rem; }
.reply-input {
  flex: 1; padding: 0.55rem 0.75rem;
  border: 1px solid var(--border); background: var(--white);
  font-family: 'DM Sans', sans-serif; font-size: 0.84rem;
  resize: none; outline: none;
}
.reply-input:focus { border-color: var(--black); }
.btn-send {
  background: var(--black); color: var(--white);
  border: none; padding: 0 1.2rem;
  font-family: 'DM Sans', sans-serif; font-size: 0.78rem;
  font-weight: 600; cursor: pointer; letter-spacing: 0.03em;
}
.btn-send:hover { background: var(--red); }

/* ── MODAL / OVERLAY ── */
.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.55);
  display: flex; align-items: center; justify-content: center;
  z-index: 100;
}
.overlay.hidden { display: none; }
.modal {
  background: var(--white);
  width: 540px; max-width: 96vw; max-height: 92vh;
  overflow-y: auto; padding: 2rem; position: relative;
}
.modal-close {
  position: absolute; top: 1rem; right: 1.1rem;
  background: none; border: none; font-size: 1.3rem;
  cursor: pointer; color: var(--mid); line-height: 1;
}
.modal-close:hover { color: var(--black); }
.modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; letter-spacing: 0.04em; margin-bottom: 1.5rem; }
.form-row { margin-bottom: 0.9rem; }
.form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.9rem; margin-bottom: 0.9rem; }
.form-label { display: block; font-size: 0.68rem; font-family: 'DM Mono', monospace; letter-spacing: 0.08em; color: var(--mid); margin-bottom: 4px; }
.form-input, .form-select, .form-textarea {
  width: 100%; padding: 8px 10px;
  border: 1px solid var(--border); background: var(--white);
  font-family: 'DM Sans', sans-serif; font-size: 0.84rem;
  outline: none; color: var(--black);
}
.form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--black); }
.form-textarea { resize: vertical; min-height: 90px; }
.btn-submit {
  width: 100%; background: var(--red); color: var(--white);
  border: none; padding: 10px; font-family: 'DM Sans', sans-serif;
  font-size: 0.84rem; font-weight: 600; cursor: pointer;
  letter-spacing: 0.04em; margin-top: 0.25rem;
}
.btn-submit:hover { background: var(--red-dark); }

/* Name modal */
.modal-sm { width: 380px; }
.name-intro { font-size: 0.82rem; color: var(--mid); margin-bottom: 1.25rem; line-height: 1.5; }

/* Utilities */
.state-msg { font-size: 0.75rem; font-family: 'DM Mono', monospace; letter-spacing: 0.07em; color: var(--mid); padding: 0.75rem 0; }
.hidden { display: none !important; }
.toast {
  position: fixed; bottom: 1.5rem; left: 50%;
  transform: translateX(-50%) translateY(2rem);
  background: var(--black); color: var(--white);
  padding: 0.55rem 1.2rem; font-size: 0.78rem;
  font-family: 'DM Mono', monospace; letter-spacing: 0.06em;
  opacity: 0; transition: all 0.2s; z-index: 999; pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- ── HEADER ── -->
<header>
  <div class="logo">PUB <span>LEGAL</span></div>
  <div class="header-right">
    <span class="attorney-pill" id="attorney-pill" onclick="showNameModal()">Set your name ▾</span>
    <button class="btn-header" onclick="openNewTicket()">+ New Ticket</button>
  </div>
</header>

<!-- ── LAYOUT ── -->
<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-top">
      <input class="search-input" type="text" id="search-input" placeholder="Search tickets…" oninput="filterTickets()">
      <div class="chips">
        <button class="chip active" data-status="all" onclick="setFilter(this)">All</button>
        <button class="chip" data-status="New" onclick="setFilter(this)">New</button>
        <button class="chip" data-status="In Progress" onclick="setFilter(this)">In Progress</button>
        <button class="chip" data-status="Urgent" onclick="setFilter(this)">Urgent</button>
        <button class="chip" data-status="Completed" onclick="setFilter(this)">Completed</button>
      </div>
    </div>
    <div class="ticket-list" id="ticket-list">
      <div class="state-msg" style="padding:1rem">Loading tickets…</div>
    </div>
  </aside>

  <!-- MAIN -->
  <main id="main">

    <!-- Welcome -->
    <div class="welcome" id="welcome">
      <div class="welcome-logo">PUB LEGAL</div>
      <div class="welcome-sub">Select a ticket to get started</div>
    </div>

    <!-- Detail -->
    <div class="detail hidden" id="detail">
      <button class="detail-back" onclick="clearDetail()">← All Tickets</button>
      <div class="detail-id" id="d-id"></div>
      <div class="detail-title" id="d-title"></div>
      <div class="detail-meta" id="d-meta"></div>

      <div class="status-bar">
        <span class="status-bar-label">Status:</span>
        <button class="status-btn" data-s="New" onclick="updateStatus('New')">New</button>
        <button class="status-btn" data-s="In Progress" onclick="updateStatus('In Progress')">In Progress</button>
        <button class="status-btn" data-s="Urgent" onclick="updateStatus('Urgent')">Urgent</button>
        <button class="status-btn" data-s="Completed" onclick="updateStatus('Completed')">Completed</button>
      </div>

      <div class="section">
        <div class="section-head">Description</div>
        <div class="description" id="d-description"></div>
        <div class="extra-grid" id="d-extras"></div>
      </div>

      <div class="section">
        <div class="section-head">
          Documents
          <button onclick="document.getElementById('file-input').click()">+ Upload</button>
        </div>
        <input type="file" id="file-input" style="display:none" onchange="uploadDocument(this.files[0])">
        <div id="d-docs"><div class="state-msg">No documents attached.</div></div>
      </div>

      <div class="section">
        <div class="section-head">Messages</div>
        <div class="messages" id="d-messages"></div>
        <div class="reply-row">
          <textarea class="reply-input" id="reply-input" rows="2" placeholder="Type a reply…"
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}"></textarea>
          <button class="btn-send" onclick="sendMessage()">Send</button>
        </div>
      </div>
    </div>

  </main>
</div>

<!-- ── NEW TICKET MODAL ── -->
<div class="overlay hidden" id="new-ticket-overlay">
  <div class="modal">
    <button class="modal-close" onclick="closeNewTicket()">×</button>
    <div class="modal-title">New Legal Request</div>
    <div class="form-row-2">
      <div>
        <label class="form-label">Submitter Name *</label>
        <select class="form-select" id="f-submitter">
          <option value="">Loading users…</option>
        </select>
      </div>
      <div>
        <label class="form-label">Department *</label>
        <select class="form-select" id="f-dept">
          <option value="">Select department</option>
          <option>Finance</option><option>Engineering</option><option>People / HR</option>
          <option>Marketing</option><option>Sales</option><option>Operations</option>
          <option>Executive</option><option>Product</option><option>Other</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <label class="form-label">Request Title *</label>
      <input class="form-input" id="f-title" type="text" placeholder="Brief description of the legal matter">
    </div>
    <div class="form-row-2">
      <div>
        <label class="form-label">Category</label>
        <select class="form-select" id="f-category">
          <option value="">Select category</option>
          <option>Contracts &amp; Agreements</option><option>Employment / HR</option>
          <option>Compliance &amp; Regulatory</option><option>IP &amp; Licensing</option>
          <option>Corporate Governance</option><option>Privacy &amp; Data</option>
          <option>Disputes &amp; Litigation</option><option>Real Estate</option><option>Other</option>
        </select>
      </div>
      <div>
        <label class="form-label">Priority</label>
        <select class="form-select" id="f-priority">
          <option value="Low">21 Days</option>
          <option value="Medium">14 Days</option>
          <option value="High">7 Days — Urgent Only</option>
        </select>
      </div>
    </div>
    <div class="form-row-2">
      <div>
        <label class="form-label">Deadline</label>
        <input class="form-input" id="f-deadline" type="date">
      </div>
      <div>
        <label class="form-label">Counterparty</label>
        <input class="form-input" id="f-counterparty" type="text" placeholder="Other party name">
      </div>
    </div>
    <div class="form-row">
      <label class="form-label">Description *</label>
      <textarea class="form-textarea" id="f-description" placeholder="Describe the legal matter in detail…"></textarea>
    </div>
    <div class="form-row">
      <label class="form-label">Confidentiality Notes</label>
      <textarea class="form-textarea" id="f-confidentiality" style="min-height:60px" placeholder="Any sensitivity or sharing restrictions…"></textarea>
    </div>
    <div class="form-row">
      <label class="form-label">Attach Document (optional)</label>
      <input class="form-input" id="f-file" type="file" style="padding:6px 10px;cursor:pointer;">
    </div>
    <button class="btn-submit" onclick="submitTicket()">Submit Request</button>
  </div>
</div>

<!-- ── ATTORNEY NAME MODAL ── -->
<div class="overlay" id="name-overlay">
  <div class="modal modal-sm">
    <div class="modal-title">Welcome</div>
    <p class="name-intro">Enter your name. This will appear on messages you send and tickets you manage.</p>
    <div class="form-row">
      <label class="form-label">Your Name</label>
      <input class="form-input" id="name-input" type="text" placeholder="e.g. Alex Rivera"
        onkeydown="if(event.key==='Enter') saveName()">
    </div>
    <button class="btn-submit" onclick="saveName()">Continue</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── CONFIG ──
const AIRTABLE_TOKEN = window.AIRTABLE_TOKEN || '';
const BASE_ID = 'appUInS3SOfPul1jr';
const TABLES = {
  tickets:  'tblgnmXTy33sKo5jT',
  messages: 'tbl2FBBd0ojDClvEo',
  users:    'tblKg2Ls7eNE1nCHs',
  docs:     'tblCvHWHKVWxPULf5'
};
const DOC_FILE_FIELD = 'fldFdB4upCStlXcoR';

let allTickets = [];
let allUsers = [];
let currentFilter = 'all';
let currentSearch = '';
let currentTicketId = null;
let counselName = '';

// ── INIT ──
window.addEventListener('load', () => {
  loadUsers();
  const saved = localStorage.getItem('pubLegalCounselName');
  if (saved) {
    counselName = saved;
    document.getElementById('attorney-pill').textContent = saved + ' ▾';
    document.getElementById('name-overlay').classList.add('hidden');
    loadTickets();
  }
});

function saveName() {
  const val = document.getElementById('name-input').value.trim();
  if (!val) { showToast('Please enter your name.'); return; }
  counselName = val;
  localStorage.setItem('pubLegalCounselName', val);
  document.getElementById('attorney-pill').textContent = val + ' ▾';
  document.getElementById('name-overlay').classList.add('hidden');
  loadTickets();
}
function showNameModal() {
  document.getElementById('name-input').value = counselName;
  document.getElementById('name-overlay').classList.remove('hidden');
}

// ── AIRTABLE HELPER ──
async function atFetch(method, path, body) {
  const url = `https://api.airtable.com/v0/${BASE_ID}/${path}`;
  try {
    const res = await fetch(url, {
      method,
      headers: {
        'Authorization': `Bearer ${AIRTABLE_TOKEN}`,
        'Content-Type': 'application/json'
      },
      body: body ? JSON.stringify(body) : undefined
    });
    if (!res.ok) { const e = await res.json(); console.error('Airtable error:', e); return null; }
    return res.json();
  } catch(e) { console.error('Fetch error:', e); return null; }
}

// ── USERS ──
async function loadUsers() {
  const data = await atFetch('GET', `${TABLES.users}?sort%5B0%5D%5Bfield%5D=Name&sort%5B0%5D%5Bdirection%5D=asc`);
  allUsers = data?.records || [];
  const sel = document.getElementById('f-submitter');
  if (!sel) return;
  if (!allUsers.length) {
    sel.innerHTML = '<option value="">No users found — add users to Airtable first</option>';
    return;
  }
  sel.innerHTML = '<option value="">Select submitter…</option>' +
    allUsers.map(r => {
      const dept = r.fields['Department'] ? ` — ${r.fields['Department']}` : '';
      return `<option value="${escHtml(r.fields['Name']||'')}" data-dept="${escHtml(r.fields['Department']||'')}">${escHtml(r.fields['Name']||'')}${dept}</option>`;
    }).join('');
  // Auto-fill department when submitter is selected
  sel.addEventListener('change', () => {
    const opt = sel.options[sel.selectedIndex];
    const dept = opt?.dataset?.dept || '';
    const deptEl = document.getElementById('f-dept');
    if (deptEl && dept) deptEl.value = dept;
  });
}

// ── TICKETS ──
async function loadTickets() {
  const list = document.getElementById('ticket-list');
  list.innerHTML = '<div class="state-msg" style="padding:1rem">Loading…</div>';
  const data = await atFetch('GET', `${TABLES.tickets}?sort%5B0%5D%5Bfield%5D=Submitted%20At&sort%5B0%5D%5Bdirection%5D=desc`);
  if (!data) { list.innerHTML = '<div class="state-msg" style="padding:1rem">Could not load tickets.</div>'; return; }
  allTickets = data.records || [];
  renderTickets();
}

function renderTickets() {
  const list = document.getElementById('ticket-list');
  const q = currentSearch.toLowerCase();
  let items = allTickets;
  if (currentFilter !== 'all') items = items.filter(r => (r.fields['Status'] || 'New') === currentFilter);
  if (q) items = items.filter(r => {
    const f = r.fields;
    return [f['Title'],f['Submitter Name'],f['Ticket ID']].some(v => (v||'').toLowerCase().includes(q));
  });
  if (!items.length) { list.innerHTML = '<div class="state-msg" style="padding:1rem">No tickets found.</div>'; return; }
  list.innerHTML = items.map(r => {
    const f = r.fields;
    const s = f['Status'] || 'New';
    const date = f['Submitted At'] ? new Date(f['Submitted At']).toLocaleDateString('en-US',{month:'short',day:'numeric'}) : '';
    return `<div class="ticket-item${r.id===currentTicketId?' active':''}" onclick="openTicket('${r.id}')">
      <div class="ti-top">
        <span class="ti-id">${escHtml(f['Ticket ID']||'—')}</span>
        <span class="pill ${pillClass(s)}">${escHtml(s)}</span>
      </div>
      <div class="ti-title">${escHtml(f['Title']||'(Untitled)')}</div>
      <div class="ti-meta">${[f['Submitter Name'],f['Department'],date].filter(Boolean).map(escHtml).join(' · ')}</div>
    </div>`;
  }).join('');
}

function setFilter(btn) {
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = btn.dataset.status;
  renderTickets();
}
function filterTickets() { currentSearch = document.getElementById('search-input').value; renderTickets(); }

// ── TICKET DETAIL ──
async function openTicket(recordId) {
  currentTicketId = recordId;
  const rec = allTickets.find(r => r.id === recordId);
  if (!rec) return;
  renderDetail(rec);
  renderTickets();
  await Promise.all([loadMessages(recordId), loadDocs(recordId)]);
}

function renderDetail(rec) {
  const f = rec.fields;
  const s = f['Status'] || 'New';
  const date = f['Submitted At'] ? new Date(f['Submitted At']).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}) : '';

  document.getElementById('d-id').textContent = [f['Ticket ID'], f['Category']].filter(Boolean).join(' · ').toUpperCase();
  document.getElementById('d-title').textContent = f['Title'] || '(Untitled)';
  document.getElementById('d-meta').innerHTML =
    `<span class="pill ${pillClass(s)}">${escHtml(s)}</span>` +
    [f['Submitter Name'], f['Department'], date].filter(Boolean).map(v => `<span class="meta-chip">${escHtml(v)}</span>`).join('');

  document.getElementById('d-description').textContent = f['Description'] || '(No description provided.)';

  const extras = [
    ['Priority', f['Priority']],
    ['Deadline', f['Deadline']],
    ['Counterparty', f['Counterparty']],
    ['Assigned To', f['Assigned To']],
    ['Confidentiality', f['Confidentiality']]
  ].filter(([,v]) => v);
  document.getElementById('d-extras').innerHTML = extras.map(([k,v]) =>
    `<div class="extra-field"><span class="extra-label">${k}</span>${escHtml(v)}</div>`).join('');

  document.querySelectorAll('.status-btn').forEach(b => b.classList.toggle('active', b.dataset.s === s));

  document.getElementById('welcome').classList.add('hidden');
  document.getElementById('detail').classList.remove('hidden');
  document.getElementById('d-messages').innerHTML = '<div class="state-msg">Loading…</div>';
  document.getElementById('d-docs').innerHTML = '<div class="state-msg">Loading…</div>';
}

function clearDetail() {
  currentTicketId = null;
  document.getElementById('detail').classList.add('hidden');
  document.getElementById('welcome').classList.remove('hidden');
  renderTickets();
}

// ── STATUS ──
async function updateStatus(newStatus) {
  if (!currentTicketId) return;
  const result = await atFetch('PATCH', `${TABLES.tickets}/${currentTicketId}`, { fields: { 'Status': newStatus } });
  if (result) {
    const rec = allTickets.find(r => r.id === currentTicketId);
    if (rec) rec.fields['Status'] = newStatus;
    renderDetail(rec || { fields: {} });
    renderTickets();
    showToast('Status updated to ' + newStatus + '.');
  } else { showToast('Failed to update status.'); }
}

// ── MESSAGES ──
async function loadMessages(ticketId) {
  const el = document.getElementById('d-messages');
  const formula = encodeURIComponent(`FIND("${ticketId}", ARRAYJOIN({Ticket}))`);
  const data = await atFetch('GET', `${TABLES.messages}?filterByFormula=${formula}&sort%5B0%5D%5Bfield%5D=Sent%20At&sort%5B0%5D%5Bdirection%5D=asc`);
  if (!data || !data.records.length) { el.innerHTML = '<div class="state-msg">No messages yet.</div>'; return; }
  el.innerHTML = data.records.map(r => {
    const f = r.fields;
    const counsel = f['Sender Role'] === 'Counsel';
    const time = f['Sent At'] ? new Date(f['Sent At']).toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}) : '';
    return `<div class="msg ${counsel?'msg-counsel':'msg-employee'}">
      <div class="msg-bubble">${escHtml(f['Body']||'')}</div>
      <div class="msg-meta">${escHtml(f['Sender Name']||'')} · ${counsel?'Counsel':'Employee'} · ${time}</div>
    </div>`;
  }).join('');
  el.scrollTop = el.scrollHeight;
}

async function sendMessage() {
  const input = document.getElementById('reply-input');
  const val = input.value.trim();
  if (!val || !currentTicketId) return;
  input.disabled = true;
  const result = await atFetch('POST', TABLES.messages, { fields: {
    'Ticket': [currentTicketId],
    'Sender Name': counselName || 'Counsel',
    'Sender Role': 'Counsel',
    'Body': val
  }});
  input.disabled = false;
  if (result) { input.value = ''; await loadMessages(currentTicketId); }
  else showToast('Message failed. Try again.');
}

// ── DOCUMENTS ──
async function loadDocs(ticketId) {
  const el = document.getElementById('d-docs');
  const formula = encodeURIComponent(`FIND("${ticketId}", ARRAYJOIN({Ticket}))`);
  const data = await atFetch('GET', `${TABLES.docs}?filterByFormula=${formula}`);
  if (!data || !data.records.length) { el.innerHTML = '<div class="state-msg">No documents attached.</div>'; return; }
  el.innerHTML = data.records.map(r => {
    const f = r.fields;
    const ext = (f['Filename']||'').split('.').pop().toUpperCase().slice(0,5) || (f['File Type']||'FILE').split('/').pop().toUpperCase().slice(0,5);
    const fileUrl = f['File']?.[0]?.url;
    return `<div class="doc-item">
      <span class="doc-ext">${escHtml(ext)}</span>
      <div class="doc-info">
        <div class="doc-name">${escHtml(f['Filename']||'Untitled')}</div>
        <div class="doc-meta">${[f['Uploaded By'],f['File Size']].filter(Boolean).map(escHtml).join(' · ')}</div>
      </div>
      ${fileUrl ? `<a class="doc-dl" href="${fileUrl}" target="_blank">↓</a>` : ''}
    </div>`;
  }).join('');
}

async function uploadDocument(file) {
  if (!file || !currentTicketId) return;
  showToast('Uploading…');
  document.getElementById('file-input').value = '';
  const result = await atFetch('POST', TABLES.docs, { fields: {
    'Ticket': [currentTicketId],
    'Filename': file.name,
    'File Type': file.type || 'application/octet-stream',
    'File Size': formatSize(file.size),
    'Uploaded By': counselName || 'Counsel'
  }});
  if (!result) { showToast('Upload failed.'); return; }
  try {
    const fd = new FormData();
    fd.append('file', file);
    fd.append('filename', file.name);
    fd.append('contentType', file.type || 'application/octet-stream');
    const up = await fetch(`https://content.airtable.com/v0/${BASE_ID}/${result.id}/${DOC_FILE_FIELD}/uploadAttachment`, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${AIRTABLE_TOKEN}` },
      body: fd
    });
    showToast(up.ok ? 'Document uploaded!' : 'Metadata saved — attach file manually in Airtable.');
  } catch { showToast('Metadata saved — attach file manually in Airtable.'); }
  await loadDocs(currentTicketId);
}

// ── NEW TICKET ──
async function submitTicket() {
  const title = document.getElementById('f-title').value.trim();
  const submitter = document.getElementById('f-submitter').value.trim();
  if (!title || !submitter) { showToast('Title and submitter name are required.'); return; }
  const fields = {
    'Title': title,
    'Submitter Name': submitter,
    'Status': 'New',
    'Assigned To': counselName || ''
  };
  const dept = document.getElementById('f-dept').value;
  const cat = document.getElementById('f-category').value;
  const pri = document.getElementById('f-priority').value;
  const dl = document.getElementById('f-deadline').value;
  const cp = document.getElementById('f-counterparty').value.trim();
  const desc = document.getElementById('f-description').value.trim();
  const conf = document.getElementById('f-confidentiality').value.trim();
  if (dept) fields['Department'] = dept;
  if (cat)  fields['Category'] = cat;
  if (pri)  fields['Priority'] = pri;
  if (dl)   fields['Deadline'] = dl;
  if (cp)   fields['Counterparty'] = cp;
  if (desc) fields['Description'] = desc;
  if (conf) fields['Confidentiality'] = conf;
  const result = await atFetch('POST', TABLES.tickets, { fields, typecast: true });
  if (result) {
    const ticketId = result.fields?.['Ticket ID'] || 'Ticket';
    // Upload attached document if one was selected
    const fileInput = document.getElementById('f-file');
    if (fileInput?.files?.length) {
      showToast(ticketId + ' created. Uploading document…');
      await uploadDocumentToTicket(fileInput.files[0], result.id, submitter);
    } else {
      showToast(ticketId + ' created.');
    }
    closeNewTicket();
    await loadTickets();
  } else showToast('Failed to create ticket.');
}
function openNewTicket() { document.getElementById('new-ticket-overlay').classList.remove('hidden'); }
function closeNewTicket() {
  document.getElementById('new-ticket-overlay').classList.add('hidden');
  ['f-title','f-description','f-counterparty','f-confidentiality','f-deadline','f-file'].forEach(id => {
    const el = document.getElementById(id); if (el) el.value = '';
  });
  ['f-submitter','f-dept','f-category','f-priority'].forEach(id => {
    const el = document.getElementById(id); if (el) el.selectedIndex = 0;
  });
}

async function uploadDocumentToTicket(file, ticketRecordId, uploaderName) {
  const result = await atFetch('POST', TABLES.docs, { fields: {
    'Ticket': [ticketRecordId],
    'Filename': file.name,
    'File Type': file.type || 'application/octet-stream',
    'File Size': formatSize(file.size),
    'Uploaded By': uploaderName || counselName || 'Counsel'
  }});
  if (!result) return;
  try {
    const fd = new FormData();
    fd.append('file', file);
    fd.append('filename', file.name);
    fd.append('contentType', file.type || 'application/octet-stream');
    await fetch(`https://content.airtable.com/v0/${BASE_ID}/${result.id}/${DOC_FILE_FIELD}/uploadAttachment`, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${AIRTABLE_TOKEN}` },
      body: fd
    });
  } catch(e) { console.warn('File binary upload failed:', e); }
}

// ── HELPERS ──
function pillClass(s) {
  return { 'New':'pill-new','In Progress':'pill-prog','Urgent':'pill-urgent','Completed':'pill-done' }[s] || 'pill-new';
}
function formatSize(b) {
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
  return (b/1048576).toFixed(1) + ' MB';
}
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
